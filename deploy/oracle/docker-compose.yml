name: whichmovieitis

services:
  db:
    image: pgvector/pgvector:0.8.2-pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=4GB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - work_mem=8MB
      - -c
      - max_connections=50
    shm_size: 1gb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      HF_HOME: /models/huggingface
    volumes:
      - model_cache:/models
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      BACKEND_HOSTNAME: ${BACKEND_HOSTNAME}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  model_cache:
  caddy_data:
  caddy_config:
